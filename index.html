<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ระบบเช็คสต็อก</title>
<style>
  body {
    font-family: 'Prompt', sans-serif;
    background: #f5f5f5;
    margin: 0; padding: 0;
  }
  header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px; background: #007BFF; color: white;
  }
  h1 { margin: 0; font-size: 1.5em; }
  .history-btn {
    background: white; color: #007BFF; border: none; border-radius: 5px;
    padding: 8px 15px; cursor: pointer; font-weight: bold;
  }
  .container {
    display: flex; flex-wrap: wrap;
    justify-content: center;
    padding: 30px;
  }
  .location-btn {
    width: 200px; height: 80px; margin: 10px;
    border: none; border-radius: 10px;
    background: #ffffff; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    font-size: 1.1em; cursor: pointer; transition: 0.2s;
  }
  .location-btn:hover { background: #e6f0ff; transform: scale(1.03); }
</style>
</head>
<body>

<header>
  <h1>ระบบเช็คสต็อก</h1>
  <button class="history-btn" onclick="goHistory()">ประวัติ</button>
</header>

<div class="container" id="locations"></div>

<script>
  // รายการปุ่มสถานที่จัดเก็บ
  const locations = [
    "Freezer สนิม", "Freezer ขาว", "ชั้นหันหน้าเข้าsink", "ชั้นหันหน้าเข้าประตู",
    "ตู้เย็นข้างประตู", "ตู้ครัวเย็น", "Freezer ครัวเย็น", "Freezer ครัวร้อน",
    "ตู้เย็นข้างsink", "ตู้stationครัวร้อน", "เตาผัดและเตาย่าง"
  ];

  const container = document.getElementById('locations');
  locations.forEach(loc => {
    const btn = document.createElement('button');
    btn.className = 'location-btn';
    btn.innerText = loc;
    btn.onclick = () => goToForm(loc);
    container.appendChild(btn);
  });

  function goToForm(location) {
    window.location.href = `form.html?location=${encodeURIComponent(location)}`;
  }

  function goHistory() {
    window.location.href = 'history.html';
  }
</script>

</body>
</html>
