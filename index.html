  <script src="https://cdn.tailwindcss.com/3.4.17"></script>

  <style>
* { font-family: 'Sarabun', sans-serif; }
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button { opacity: 1; height: 32px; }
.fade-in { animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.loc-btn { transition: all 0.15s ease; }
.loc-btn:active { transform: scale(0.97); }
.toast-show { animation: toastIn 0.3s ease, toastOut 0.3s ease 2.2s forwards; }
@keyframes toastIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }
</style>
  <style>body { box-sizing: border-box; }</style>

 <body class="h-full bg-slate-50">
  <div id="app" class="h-full w-full overflow-auto">
   <!-- MAIN PAGE -->
   <div id="page-main" class="fade-in">
    <header class="bg-gradient-to-r from-emerald-600 to-teal-600 text-white px-4 py-5 flex items-center justify-between shadow-md">
     <div>
      <h1 id="main-title" class="text-xl font-bold tracking-tight">📦 เช็คสต็อค</h1>
      <p class="text-emerald-100 text-xs mt-0.5">เลือกสถานที่จัดเก็บเพื่อเริ่มเช็ค</p>
     </div><button onclick="showHistory()" class="flex items-center gap-1.5 bg-white/20 hover:bg-white/30 rounded-lg px-3 py-2 text-sm font-medium transition"> <i data-lucide="history" style="width:18px;height:18px"></i> ประวัติ </button>
    </header>
    <div class="p-4 grid grid-cols-2 gap-3 max-w-lg mx-auto" id="location-grid"></div>
   </div><!-- CHECKER NAME PAGE -->
   <div id="page-checker" class="hidden fade-in">
    <header class="bg-gradient-to-r from-emerald-600 to-teal-600 text-white px-4 py-4 flex items-center gap-3 shadow-md">
     <button onclick="goMain()" class="p-1 rounded-lg hover:bg-white/20 transition"><i data-lucide="arrow-left" style="width:22px;height:22px"></i></button>
     <div>
      <h2 class="font-bold text-lg" id="checker-loc-title"></h2>
      <p class="text-emerald-100 text-xs">กรอกชื่อผู้เช็ค</p>
     </div>
    </header>
    <div class="p-6 max-w-md mx-auto">
     <label class="block text-sm font-semibold text-slate-700 mb-2">ชื่อผู้เช็คสต็อค</label> <input id="checker-name" type="text" placeholder="กรอกชื่อ-นามสกุล" class="w-full border-2 border-slate-200 focus:border-emerald-500 rounded-xl px-4 py-3 text-lg outline-none transition"> <button onclick="startCheck()" class="mt-4 w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-xl text-lg transition active:scale-[0.98]">เริ่มเช็คสต็อค</button>
    </div>
   </div><!-- STOCK ENTRY PAGE -->
   <div id="page-entry" class="hidden fade-in">
    <header class="bg-gradient-to-r from-emerald-600 to-teal-600 text-white px-4 py-3 flex items-center justify-between shadow-md sticky top-0 z-10">
     <div class="flex items-center gap-3">
      <button onclick="confirmBack()" class="p-1 rounded-lg hover:bg-white/20 transition"><i data-lucide="arrow-left" style="width:22px;height:22px"></i></button>
      <div>
       <h2 class="font-bold text-base" id="entry-loc-title"></h2>
       <p class="text-emerald-100 text-xs" id="entry-checker-info"></p>
      </div>
     </div><button onclick="saveStock()" id="save-btn" class="bg-white text-emerald-700 font-bold px-4 py-2 rounded-lg text-sm hover:bg-emerald-50 transition active:scale-[0.97]"> 💾 บันทึก </button>
    </header>
    <div class="px-3 py-2 overflow-x-auto">
     <table class="w-full text-sm" id="stock-table">
      <thead>
       <tr class="bg-slate-100 text-slate-600 text-xs">
        <th class="text-left py-2 px-2 rounded-l-lg font-semibold">#</th>
        <th class="text-left py-2 px-1 font-semibold">รายการ</th>
        <th class="text-center py-2 px-1 font-semibold w-20">คงเหลือ</th>
        <th class="text-center py-2 px-1 font-semibold w-14">หน่วย</th>
        <th class="text-left py-2 px-1 rounded-r-lg font-semibold w-20">SKU</th>
       </tr>
      </thead>
      <tbody id="stock-body"></tbody>
     </table>
    </div>
   </div><!-- HISTORY PAGE -->
   <div id="page-history" class="hidden fade-in">
    <header class="bg-gradient-to-r from-emerald-600 to-teal-600 text-white px-4 py-4 flex items-center gap-3 shadow-md">
     <button onclick="goMain()" class="p-1 rounded-lg hover:bg-white/20 transition"><i data-lucide="arrow-left" style="width:22px;height:22px"></i></button>
     <div>
      <h2 class="font-bold text-lg">📋 ประวัติการเช็คสต็อค</h2>
     </div>
    </header>
    <div class="p-4 max-w-lg mx-auto">
     <label class="block text-sm font-semibold text-slate-700 mb-1">กรองตามวันที่</label> <input type="date" id="history-date" onchange="filterHistory()" class="w-full border-2 border-slate-200 focus:border-emerald-500 rounded-xl px-4 py-2.5 outline-none transition mb-4">
     <div id="history-list"></div>
    </div>
   </div><!-- HISTORY DETAIL PAGE -->
   <div id="page-detail" class="hidden fade-in">

     <div class="flex items-center gap-3">
      <button onclick="showHistory()" class="p-1 rounded-lg hover:bg-white/20 transition"><i data-lucide="arrow-left" style="width:22px;height:22px"></i></button>
      <div>
       <h2 class="font-bold text-base" id="detail-title"></h2>
       <p class="text-emerald-100 text-xs" id="detail-info"></p>
      </div>
     </div><button onclick="deleteRecord()" id="delete-btn" class="bg-red-500/80 hover:bg-red-500 text-white text-xs px-3 py-1.5 rounded-lg transition">🗑 ลบ</button>
    </header>
    <div class="px-3 py-2 overflow-x-auto">
     <table class="w-full text-sm">
      <thead>
       <tr class="bg-slate-100 text-slate-600 text-xs">

        <th class="text-center py-2 px-1 font-semibold w-14">หน่วย</th>
        <th class="text-left py-2 px-1 font-semibold w-20">SKU</th>
        <th class="text-left py-2 px-1 rounded-r-lg font-semibold w-20">หมายเหตุ</th>
       </tr>
      </thead>
      <tbody id="detail-body"></tbody>
     </table>
    </div>
   </div><!-- TOAST -->
   <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-5 py-3 rounded-xl shadow-lg text-sm font-medium hidden z-50"></div><!-- CONFIRM BACK MODAL -->
   <div id="confirm-modal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 hidden">
    <div class="bg-white rounded-2xl p-6 mx-4 max-w-sm w-full shadow-xl fade-in">
     <p class="text-lg font-semibold text-slate-800 mb-1">ออกจากหน้านี้?</p>
     <p class="text-slate-500 text-sm mb-5">ข้อมูลที่กรอกไว้จะหายไป</p>
     <div class="flex gap-3">
      <button onclick="hideModal()" class="flex-1 py-2.5 rounded-xl border-2 border-slate-200 font-semibold text-slate-600 hover:bg-slate-50 transition">อยู่ต่อ</button> <button onclick="hideModal();goMain()" class="flex-1 py-2.5 rounded-xl bg-red-500 text-white font-semibold hover:bg-red-600 transition">ออก</button>
     </div>
    </div>
   </div><!-- DELETE CONFIRM MODAL -->

     <p class="text-slate-500 text-sm mb-5">ข้อมูลจะถูกลบอย่างถาวร</p>

    </div>

// ============ STATE ============
let allRecords = [];
let currentLocation = null;
let currentChecker = '';
let viewingRecord = null;
let hasEntryChanges = false;

// ============ RENDER LOCATION GRID ============
function renderGrid() {
  const grid = document.getElementById('location-grid');
  let html = '';
  for (let i = 0; i < LOCATIONS.length; i++) {
    const loc = LOCATIONS[i];
    html += `<button onclick="selectLocation('${loc.id}')" class="loc-btn bg-gradient-to-br ${loc.color} text-white rounded-2xl p-4 text-left shadow-md hover:shadow-lg"><div class="text-2xl mb-1">${loc.icon}</div><div class="font-bold text-sm leading-tight">${loc.name}</div></button>`;
  }
  grid.innerHTML = html;
}

// ============ NAVIGATION ============
function showPage(id) {
  ['page-main','page-checker','page-entry','page-history','page-detail'].forEach(p => {
    const el = document.getElementById(p);
    if (p === id) { el.classList.remove('hidden'); el.classList.add('fade-in'); }
    else { el.classList.add('hidden'); }
  });
  window.scrollTo(0, 0);
}

function goMain() { hasEntryChanges = false; showPage('page-main'); }

function selectLocation(id) {
  currentLocation = id;
  const loc = LOCATIONS.find(l => l.id === id);
  document.getElementById('checker-loc-title').textContent = loc.name;
  document.getElementById('checker-name').value = '';
  showPage('page-checker');
  setTimeout(() => document.getElementById('checker-name').focus(), 100);
}

function startCheck() {
  const name = document.getElementById('checker-name').value.trim();
  if (!name) { showToast('⚠️ กรุณากรอกชื่อผู้เช็ค'); return; }
  currentChecker = name;
  const loc = LOCATIONS.find(l => l.id === currentLocation);
  document.getElementById('entry-loc-title').textContent = loc.name;
  document.getElementById('entry-checker-info').textContent = `ผู้เช็ค: ${name}`;
  renderStockTable();
  hasEntryChanges = false;
  showPage('page-entry');
}

function confirmBack() {
  if (hasEntryChanges) {
    document.getElementById('confirm-modal').classList.remove('hidden');
  } else { goMain(); }
}
function hideModal() { document.getElementById('confirm-modal').classList.add('hidden'); }

// ============ STOCK TABLE ============
function renderStockTable() {
  const items = STOCK_ITEMS[currentLocation] || [];
  const tbody = document.getElementById('stock-body');
  let html = '';
  for (let i = 0; i < items.length; i++) {
    const item = items[i];
    const bgClass = i % 2 === 0 ? 'bg-white' : 'bg-slate-50';
    html += `<tr class="${bgClass} border-b border-slate-100"><td class="py-2.5 px-2 text-slate-400 text-xs">${i + 1}</td><td class="py-2.5 px-1 font-medium text-slate-800 text-sm">${item.name}</td><td class="py-2.5 px-1 text-center"><input type="number" min="0" step="0.1" data-idx="${i}" oninput="hasEntryChanges=true" class="w-16 text-center border-2 border-slate-200 focus:border-emerald-500 rounded-lg py-1.5 text-sm font-semibold outline-none transition" placeholder="-" /></td><td class="py-2.5 px-1 text-center text-slate-500 text-xs">${item.unit}</td><td class="py-2.5 px-1 text-slate-400 text-xs font-mono">${item.sku}</td></tr>`;
  }
  tbody.innerHTML = html;
}

// ============ SAVE ============
async function saveStock() {
  const items = STOCK_ITEMS[currentLocation] || [];
  const inputs = document.querySelectorAll('#stock-body input[type="number"]');
  
  const itemsToSave = [];
  for (let i = 0; i < items.length; i++) {
    const input = inputs[i];
    const val = input ? input.value.trim() : '';
    if (val !== '' && !isNaN(val) && Number(val) > 0) {
      itemsToSave.push({
        itemName: items[i].name,
        qty: String(Number(val)),
        unit: items[i].unit,
        sku: items[i].sku
      });
    }
  }

  if (itemsToSave.length === 0) {
    showToast('⚠️ กรุณากรอกปริมาณอย่างน้อย 1 รายการ');
    return;
  }

  if ((allRecords.length + itemsToSave.length) > 999) {
    showToast('⚠️ ข้อมูลเต็มแล้ว กรุณาลบรายการเก่า');
    return;
  }

  const btn = document.getElementById('save-btn');
  btn.textContent = '⏳ กำลังบันทึก...';
  btn.disabled = true;

  let successCount = 0;
  const recordDate = String(new Date().toISOString());
  
  for (let i = 0; i < itemsToSave.length; i++) {
    const itemData = itemsToSave[i];
    const recordData = {
      location: String(currentLocation || 'unknown'),
      checker_name: String(currentChecker || 'ไม่ระบุ'),
      date: recordDate,
      item_name: String(itemData.itemName),
      quantity: itemData.qty,
      unit: String(itemData.unit),
      sku: String(itemData.sku)
    };

    const result = await window.dataSdk.create(recordData);
    if (result.isOk) successCount++;
  }

  btn.textContent = '💾 บันทึก';
  btn.disabled = false;

  if (successCount === itemsToSave.length) {
    showToast(`✅ บันทึก ${successCount} รายการสำเร็จ!`);
    hasEntryChanges = false;
    setTimeout(() => goMain(), 800);
  } else {
    showToast(`⚠️ บันทึก ${successCount}/${itemsToSave.length} รายการ`);
  }
}

// ============ HISTORY ============
function showHistory() {
  document.getElementById('history-date').value = '';
  renderHistoryList(allRecords);
  showPage('page-history');
}

function filterHistory() {
  const dateVal = document.getElementById('history-date').value;
  if (!dateVal) { renderHistoryList(allRecords); return; }
  const filtered = allRecords.filter(r => r.date && r.date.startsWith(dateVal));
  renderHistoryList(filtered);
}

function renderHistoryList(records) {
  const list = document.getElementById('history-list');
  if (!records.length) {
    list.innerHTML = '<div class="text-center text-slate-400 py-10">ยังไม่มีประวัติ</div>';
    return;
  }
  
  const grouped = {};
  for (let i = 0; i < records.length; i++) {
    const r = records[i];
    const key = r.date + '|' + r.checker_name + '|' + r.location;
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(r);
  }

  const sessions = Object.values(grouped).sort((a, b) => new Date(b[0].date) - new Date(a[0].date));
  
  let html = '';
  for (let j = 0; j < sessions.length; j++) {
    const sessionRecords = sessions[j];
    const r = sessionRecords[0];
    const loc = LOCATIONS.find(l => l.id === r.location);
    const d = new Date(r.date);
    const dateStr = d.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: '2-digit' });
    const timeStr = d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
    const sessionKey = r.date + '|' + r.checker_name + '|' + r.location;
    html += `<button onclick='viewDetail("${sessionKey}")' class="w-full text-left bg-white rounded-xl p-4 mb-2 shadow-sm border border-slate-100 hover:shadow-md transition active:scale-[0.99]"><div class="flex items-center justify-between"><div class="flex items-center gap-3"><span class="text-xl">${loc?.icon || '📦'}</span><div><div class="font-bold text-slate-800 text-sm">${loc?.name || r.location}</div><div class="text-slate-400 text-xs">👤 ${r.checker_name} · ${dateStr} ${timeStr} · ${sessionRecords.length} รายการ</div></div></div><i data-lucide="chevron-right" style="width:18px;height:18px;color:#94a3b8"></i></div></button>`;
  }
  list.innerHTML = html;
  lucide.createIcons();
}

function viewDetail(sessionKey) {
  const [date, checkerName, location] = sessionKey.split('|');
  const sessionRecords = allRecords.filter(r => r.date === date && r.checker_name === checkerName && r.location === location);
  
  if (!sessionRecords.length) return;
  
  viewingRecord = sessionRecords[0];
  const loc = LOCATIONS.find(l => l.id === location);
  const d = new Date(date);
  document.getElementById('detail-title').textContent = loc?.name || location;
  document.getElementById('detail-info').textContent = `👤 ${checkerName} · ${d.toLocaleDateString('th-TH')} ${d.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })}`;

  let html = '';
  for (let i = 0; i < sessionRecords.length; i++) {
    const record = sessionRecords[i];
    const bgClass = i % 2 === 0 ? 'bg-white' : 'bg-slate-50';
    html += `<tr class="${bgClass} border-b border-slate-100"><td class="py-2.5 px-2 text-slate-400 text-xs">${i + 1}</td><td class="py-2.5 px-1 font-medium text-slate-800 text-sm">${record.item_name || '-'}</td><td class="py-2.5 px-1 text-center font-bold text-emerald-600">${record.quantity || '-'}</td><td class="py-2.5 px-1 text-center text-slate-500 text-xs">${record.unit || '-'}</td><td class="py-2.5 px-1 text-slate-400 text-xs font-mono">${record.sku || '-'}</td></tr>`;
  }
  document.getElementById('detail-body').innerHTML = html;

  showPage('page-detail');
}

function deleteRecord() {
  document.getElementById('delete-modal').classList.remove('hidden');
}

async function confirmDelete() {
  document.getElementById('delete-modal').classList.add('hidden');
  if (!viewingRecord) return;
  
  const btn = document.getElementById('delete-btn');
  btn.textContent = '⏳ กำลังลบ...';
  btn.disabled = true;

  // หาเซสชัน
  const sessionRecords = allRecords.filter(r => 
    r.date === viewingRecord.date && 
    r.checker_name === viewingRecord.checker_name && 
    r.location === viewingRecord.location
  );

  let successCount = 0;
  for (const record of sessionRecords) {
    const result = await window.dataSdk.delete(record);
    if (result.isOk) successCount++;
  }

  btn.textContent = '🗑 ลบ';
  btn.disabled = false;

  if (successCount === sessionRecords.length) {
    showToast('🗑 ลบสำเร็จ');
    showHistory();
  } else {
    showToast(`⚠️ ลบ ${successCount}/${sessionRecords.length} รายการ`);
  }
}

// ============ TOAST ============
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  t.classList.add('toast-show');
  setTimeout(() => { t.classList.add('hidden'); t.classList.remove('toast-show'); }, 2500);
}

// ============ ELEMENT SDK ============
const defaultConfig = {
  app_title: 'เช็คสต็อค',
  background_color: '#f8fafc',
  header_color: '#059669',
  text_color: '#1e293b',
  accent_color: '#10b981',
  surface_color: '#ffffff',
  font_family: 'Sarabun',
  font_size: 14
};

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => {
    const title = config.app_title || defaultConfig.app_title;
    const el = document.getElementById('main-title');
    if (el) el.textContent = '📦 ' + title;

    const bg = config.background_color || defaultConfig.background_color;
    document.body.style.backgroundColor = bg;

    const txt = config.text_color || defaultConfig.text_color;
    document.body.style.color = txt;

    const surface = config.surface_color || defaultConfig.surface_color;
    document.querySelectorAll('table tr.bg-white, .bg-white').forEach(e => e.style.backgroundColor = surface);

    const font = config.font_family || defaultConfig.font_family;
    document.body.style.fontFamily = `${font}, Sarabun, sans-serif`;

    const size = config.font_size || defaultConfig.font_size;
    document.body.style.fontSize = size + 'px';
  },
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: v => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
      { get: () => config.surface_color || defaultConfig.surface_color, set: v => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
      { get: () => config.text_color || defaultConfig.text_color, set: v => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
      { get: () => config.accent_color || defaultConfig.accent_color, set: v => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
      { get: () => config.header_color || defaultConfig.header_color, set: v => { config.header_color = v; window.elementSdk.setConfig({ header_color: v }); } },
    ],
    borderables: [],
    fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: v => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
    fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: v => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
  }),
  mapToEditPanelValues: (config) => new Map([
    ['app_title', config.app_title || defaultConfig.app_title]
  ])
});

// ============ DATA SDK ============
const dataHandler = {
  onDataChanged(data) {
    allRecords = data;
    // If on history page, refresh
    if (!document.getElementById('page-history').classList.contains('hidden')) {
      filterHistory();
    }
  }
};

(async () => {
  const result = await window.dataSdk.init(dataHandler);
  if (!result.isOk) console.error('Data SDK init failed');
  renderGrid();
  lucide.createIcons();
})();
