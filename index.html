<!doctype html>
<html lang="th" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Checker (Production)</title>

<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* { font-family: 'Sarabun', sans-serif; }
.fade-in { animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(8px);} to {opacity:1; transform:translateY(0);} }
</style>
</head>

<body class="bg-slate-50">
<div id="app">

<!-- MAIN -->
<div id="page-main">
<header class="bg-gradient-to-r from-emerald-600 to-teal-600 text-white p-4 flex justify-between">
<h1 class="text-xl font-bold">📦 เช็คสต็อค</h1>
<button onclick="showHistory()"><i data-lucide="history"></i></button>
</header>
<div id="location-grid" class="p-4 grid grid-cols-2 gap-3"></div>
</div>

<!-- CHECKER -->
<div id="page-checker" class="hidden p-4">
<button onclick="goMain()"><i data-lucide="arrow-left"></i></button>
<input id="checker-name" placeholder="ชื่อผู้เช็ค" class="w-full border p-3 rounded mt-3">
<button onclick="startCheck()" class="mt-3 w-full bg-emerald-600 text-white p-3 rounded">เริ่มเช็ค</button>
</div>

<!-- ENTRY TABLE -->
<div id="page-entry" class="hidden p-3">
<button onclick="goChecker()"><i data-lucide="arrow-left"></i></button>
<h2 id="entry-title" class="font-bold mb-2"></h2>

<div class="overflow-x-auto">
<table class="w-full text-sm bg-white rounded-xl overflow-hidden">
<thead class="bg-slate-100">
<tr>
<th>#</th>
<th>รายการ</th>
<th>คงเหลือ</th>
<th>หน่วย</th>
<th>หมายเหตุ</th>
</tr>
</thead>
<tbody id="stock-body"></tbody>
</table>
</div>

<button onclick="saveStock()" class="mt-4 w-full bg-blue-600 text-white p-3 rounded">💾 บันทึก</button>
</div>

<!-- HISTORY -->
<div id="page-history" class="hidden p-4">
<button onclick="goMain()"><i data-lucide="arrow-left"></i></button>
<h2 class="font-bold mb-2">ประวัติ</h2>
<div id="history-list"></div>
</div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyyO0xdmzrvEDJFFs_zmEjm81YGWzqEdhr2OKYnpVKEbdy4I89nzno2lSj0sijOgm2z/exec";

const STOCK = {
  freezer_rust: [
    { name:'Beef Tongue Wrapped', unit:'G' },
    { name:'Beef Striploin', unit:'G' },
    { name:'French Fries', unit:'G' }
  ],
  freezer_white: [
    { name:'กึ๋นไก่', unit:'G' },
    { name:'เกี๊ยวซ่า', unit:'G' }
  ]
};

const LOCATIONS = [
  { id:'freezer_rust', name:'Freezer สนิม', icon:'box' },
  { id:'freezer_white', name:'Freezer ขาว', icon:'snowflake' }
];

let currentLocation = '';
let currentList = [];

function renderLocations(){
  const el = document.getElementById('location-grid');
  el.innerHTML = LOCATIONS.map(l=>`
    <button onclick="selectLocation('${l.id}')" class="bg-white p-4 rounded-xl shadow">
      <i data-lucide="${l.icon}"></i>
      <div>${l.name}</div>
    </button>
  `).join('');
  lucide.createIcons();
}

function selectLocation(id){
  currentLocation = id;
  currentList = STOCK[id];
  switchPage('page-checker');
}

function startCheck(){
  renderTable();
  document.getElementById('entry-title').innerText = currentLocation;
  switchPage('page-entry');
}

function renderTable(){
  const body = document.getElementById('stock-body');
  body.innerHTML = currentList.map((item,i)=>`
    <tr>
      <td>${i+1}</td>
      <td>${item.name}</td>
      <td><input type="number" id="qty-${i}" class="w-20 border"></td>
      <td>${item.unit}</td>
      <td><input id="note-${i}" class="border"></td>
    </tr>
  `).join('');
}

async function saveStock(){
  const checker = document.getElementById('checker-name').value;

  const items = currentList.map((item,i)=>({
    item:item.name,
    qty:document.getElementById(`qty-${i}`).value,
    note:document.getElementById(`note-${i}`).value
  }));

  await fetch(API_URL, {
    method:'POST',
    body: JSON.stringify({ location: currentLocation, checker, items })
  });

  alert('บันทึกสำเร็จ');
  goMain();
}

async function showHistory(){
  switchPage('page-history');
  const res = await fetch(API_URL);
  const data = await res.json();

  document.getElementById('history-list').innerHTML = data.map(d=>`
    <div class="bg-white p-2 rounded shadow mb-2">
      ${d.location} - ${d.item} (${d.qty})
    </div>
  `).join('');
}

function switchPage(id){
  document.querySelectorAll('[id^="page-"]').forEach(p=>p.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
  lucide.createIcons();
}

function goMain(){ switchPage('page-main'); }
function goChecker(){ switchPage('page-checker'); }

window.onload = ()=>{ renderLocations(); };
</script>

</body>
</html>
