<!doctype html>
<html lang="th" class="h-full">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Checker</title>

<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
* { font-family: 'Sarabun', sans-serif; }
.fade-in { animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px);} to { opacity:1; transform: translateY(0);} }
</style>
</head>

<body class="h-full bg-slate-50">

<div id="app" class="h-full w-full overflow-auto">

<!-- MAIN -->
<div id="page-main">
<header class="bg-emerald-600 text-white px-4 py-4 flex justify-between">
<h1 class="text-xl font-bold">📦 เช็คสต็อค</h1>
<button onclick="showHistory()"><i data-lucide="history"></i></button>
</header>

<div class="p-4 grid grid-cols-2 gap-3" id="location-grid"></div>
</div>

<!-- HISTORY -->
<div id="page-history" class="hidden p-4">
<button onclick="goMain()"><i data-lucide="arrow-left"></i></button>
<h2 class="text-lg font-bold mb-3">ประวัติ</h2>
<div id="history-list"></div>
</div>

</div>

<script>

// ===== DATA =====
const LOCATIONS = [
  { id:'freezer', name:'Freezer', icon:'box' },
  { id:'fridge', name:'Fridge', icon:'snowflake' },
  { id:'shelf', name:'Shelf', icon:'archive' },
  { id:'kitchen', name:'Kitchen', icon:'flame' }
];

// ===== RENDER =====
function renderLocations(){
  const grid = document.getElementById('location-grid');
  grid.innerHTML = LOCATIONS.map(l=>`
    <button onclick="selectLocation('${l.name}')" class="bg-white rounded-xl p-4 shadow flex flex-col items-center gap-2">
      <i data-lucide="${l.icon}"></i>
      <span>${l.name}</span>
    </button>
  `).join('');

  lucide.createIcons();
}

// ===== NAV =====
function showHistory(){
  document.getElementById('page-main').classList.add('hidden');
  document.getElementById('page-history').classList.remove('hidden');

  renderHistory();
}

function goMain(){
  document.getElementById('page-history').classList.add('hidden');
  document.getElementById('page-main').classList.remove('hidden');

  lucide.createIcons();
}

// ===== ACTION =====
function selectLocation(name){
  alert('เลือก: '+name);
}

// ===== HISTORY =====
function renderHistory(){
  const list = document.getElementById('history-list');

  list.innerHTML = `
    <div class="bg-white p-3 rounded shadow mb-2">ตัวอย่างประวัติ 1</div>
    <div class="bg-white p-3 rounded shadow">ตัวอย่างประวัติ 2</div>
  `;

  lucide.createIcons();
}

// ===== INIT =====
window.onload = function(){
  renderLocations();
  lucide.createIcons();
};

</script>

</body>
</html>
